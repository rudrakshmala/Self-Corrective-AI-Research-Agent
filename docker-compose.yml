version: "3.9"

services:
  rag-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: self-corrective-rag:latest
    container_name: rag_agent
    environment:
      # в”Ђв”Ђ Required API Keys (override via .env or docker secret) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
      # в”Ђв”Ђ LangSmith (optional) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-self-corrective-rag}
      # в”Ђв”Ђ Model Configuration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ROUTER_MODEL=${ROUTER_MODEL:-gpt-4o-mini}
      - GENERATOR_MODEL=${GENERATOR_MODEL:-gpt-4o}
      - GRADER_MODEL=${GRADER_MODEL:-gpt-4o-mini}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-text-embedding-3-small}
      - TEMPERATURE=${TEMPERATURE:-0.0}
      # в”Ђв”Ђ RAG Configuration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TOP_K_DOCS=${TOP_K_DOCS:-4}
      - MAX_ITERATIONS=${MAX_ITERATIONS:-3}
      - HALLUCINATION_THRESHOLD=${HALLUCINATION_THRESHOLD:-0.5}
      # в”Ђв”Ђ ChromaDB в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - CHROMA_PERSIST_DIR=/data/chroma_db
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-rag_documents}
    volumes:
      # Persist ChromaDB index across container restarts
      - chroma_data:/data/chroma_db
      # Persist evaluation results
      - eval_results:/app/evaluation/results
      # Mount local documents for ingestion
      - ./docs:/app/docs:ro
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from graph.graph_builder import build_graph; build_graph()"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  # в”Ђв”Ђ Test Runner (runs tests and exits) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  rag-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: self-corrective-rag:latest
    container_name: rag_tests
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test-key-placeholder}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-test-key-placeholder}
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    profiles:
      - test

volumes:
  chroma_data:
    driver: local
  eval_results:
    driver: local
